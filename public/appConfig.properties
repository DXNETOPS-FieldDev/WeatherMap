appName=NetOps WeatherMap
description=Interactive geo-map of network sites colored by Spectrum alarm severity, with per-device CPU/Memory/Disk metrics, drill-down to NetOps inventory, marker clustering, and live weather overlays (precipitation, temperature, wind, clouds, radar) from OpenWeatherMap.

# ============================================================================
# Spectrum API proxy — pick ONE url= line below.
#
# Both options give the App View a same-origin path to Spectrum's REST API
# with Basic auth injected server-side (browser never sees credentials).
# Choose whichever fits your environment.
#
# OPTION A (default) — JSP Proxy
#   - Self-contained: spectrum-proxy.jsp ships inside this App View zip.
#   - Customer just unzips and it works. No env config needed.
#   - Requires PC's web container (Jetty/Tomcat) to process JSPs under
#     /pc/apps/user/<app>/. Verified on DX NetOps Performance Center.
#   - Edit spectrum-proxy.jsp to set SPECTRUM_BASE and AUTH_HEADER if
#     your Spectrum host or credentials differ from the defaults.
#
# OPTION B — nginx reverse proxy
#   - Requires a customer-managed nginx (or equivalent) location block
#     that forwards /spectrum/ to the Spectrum REST API with Basic auth.
#   - Use when your environment already has a reverse proxy in front of
#     PC and you'd rather configure it there than ship a JSP.
#   - Example nginx snippet (drop into the dev-netops server block):
#       location /spectrum/ {
#         proxy_pass https://<spectrum-host>:8443/spectrum/;
#         proxy_set_header Authorization "Basic <base64 user:pass>";
#         proxy_ssl_verify off;
#       }
# ============================================================================

# Option A — JSP Proxy (default)
url=index.html?id={ItemIdDA}&startTime={TimeStartUTC}&endTime={TimeEndUTC}

# Option B — nginx reverse proxy (uncomment, and comment out Option A above)
#url=index.html?id={ItemIdDA}&startTime={TimeStartUTC}&endTime={TimeEndUTC}&proxy=nginx

height=700
supportedContext=nc
